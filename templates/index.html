<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Потужний To do Glist ⚡</title>
    <style>
        /* Живой движущийся фон */
        @keyframes powerfulBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Эпичный влет контейнера */
        @keyframes hyperEnter {
            0% { opacity: 0; transform: scale(0.7) rotate(-3deg); }
            70% { transform: scale(1.05) rotate(1deg); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); }
        }

        /* Бешеное вращение для кнопки */
        @keyframes spinGlow {
            0% { transform: rotate(0deg); box-shadow: 0 0 5px #00ffcc; }
            50% { box-shadow: 0 0 25px #ff00ff; }
            100% { transform: rotate(360deg); box-shadow: 0 0 5px #00ffcc; }
        }

        /* Неоновое мигание для мемного блока */
        @keyframes neonGlow {
            0%, 100% { border-color: #ff007f; box-shadow: 0 0 10px rgba(255, 0, 127, 0.2); }
            50% { border-color: #00f0ff; box-shadow: 0 0 25px rgba(0, 240, 255, 0.6); transform: scale(1.02); }
        }

        /* Тряска кнопки удаления */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-3px) rotate(-5deg); }
            75% { transform: translateX(3px) rotate(5deg); }
        }

        body {
            font-family: 'Impact', 'Arial Black', sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: powerfulBg 10s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            width: 100%;
            max-width: 480px;
            padding: 35px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            animation: hyperEnter 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            border: 4px solid #000;
        }

        h1 {
            color: #000;
            text-align: center;
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 36px;
            text-transform: uppercase;
            text-shadow: 3px 3px 0px #00f0ff;
            letter-spacing: 1px;
        }

        form {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }

        input[type="text"] {
            flex: 1;
            padding: 16px;
            border: 3px solid #000;
            border-radius: 12px;
            font-size: 18px;
            font-family: 'Segoe UI', sans-serif;
            font-weight: bold;
            outline: none;
            transition: all 0.2s ease;
            background: #fff;
        }

        input[type="text"]:focus {
            background: #ffffd0;
            transform: skewX(-2deg);
            box-shadow: 5px 5px 0px #000;
        }

        button {
            padding: 16px 26px;
            background: #00ffcc;
            color: #000;
            border: 3px solid #000;
            border-radius: 12px;
            font-size: 26px;
            font-weight: 900;
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: 4px 4px 0px #000;
        }

        button:hover {
            animation: spinGlow 0.6s linear infinite;
            background: #ff00ff;
            color: #fff;
        }

        button:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px #000;
        }

        .task-list {
            padding: 0;
            margin: 0;
            list-style: none;
        }

        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: #fff;
            border: 3px solid #000;
            border-radius: 14px;
            margin-bottom: 14px;
            box-shadow: 5px 5px 0px #000;
            transition: all 0.2s ease;
        }

        .task-item span {
            font-family: 'Segoe UI', sans-serif;
            font-weight: 800;
            font-size: 18px;
            color: #000;
        }

        .task-item:hover {
            transform: scale(1.03) rotate(1deg);
            background: #f1f2f6;
            box-shadow: 8px 8px 0px #ff00ff;
        }

        .delete-btn {
            background: #ff7675;
            color: #000;
            border: 2px solid #000;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            padding: 6px 14px;
            border-radius: 8px;
            box-shadow: 2px 2px 0px #000;
            transition: all 0.1s;
        }

        .delete-btn:hover {
            background: #ff4757;
            color: #fff;
            animation: shake 0.3s infinite linear;
            box-shadow: 4px 4px 0px #000;
        }

        .empty-msg {
            text-align: center;
            margin-top: 20px;
            padding: 40px 20px;
            border: 4px dashed #000;
            border-radius: 16px;
            background: #111;
            color: #fff;
            animation: neonGlow 2s infinite ease-in-out;
        }
        
        .empty-msg p {
            margin: 0;
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 2px 2px 0px #ff007f;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚀 Потужний Glist 🚀</h1>

        <form method="post" action="/add">
            <input type="text" name="task" placeholder="Який план, чиста суєта?" required autocomplete="off">
            <button type="submit"> + </button>
        </form>

        {% if tasks %}
            <ul class="task-list">
            {% for t in tasks %}
                <li class="task-item">
                    <span>🔥 {{ t }}</span>
                    <a href="/delete/{{ loop.index0 }}/" class="delete-btn" title="Видалити">✕</a>
                </li>
            {% endfor %}
            </ul>
        {% else %}
            <div class="empty-msg">
                <p>😎 Ну, Вась, тут нєма нічого. Або ти нічого не зробив! 😎</p>
            </div>
        {% endif %}
    </div>

</body>
</html>
